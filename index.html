<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carousel Pixel Perfect</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

<style>
body { font-family: sans-serif; background:#f3f4f6; }

/* CANVAS */
.canvas-wrapper { width:100%; padding-bottom:100%; position:relative; }
.canvas-inner {
    position:absolute;
    width:1080px;
    height:1080px;
    transform-origin:top left;
    background:#fff;
}

/* CONTENT */
.slide-content {
    position:absolute;
    top:200px;
    left:80px;
    right:80px;
    bottom:80px;
    display:flex;
    justify-content:center;
    align-items:flex-start;
}

.rendered-text {
    font-size:40px;
    line-height:1.4;
    width:100%;
}

/* 🔥 PIXEL PERFECT HIGHLIGHT */
.hl {
    display:inline-block;
    padding:10px 16px;
    border-radius:10px;
    line-height:1.3;
    white-space:pre-wrap;
    word-break:break-word;
}

/* RESPONSIVE SCALE */
@media (min-width:1024px){
    .canvas-inner { transform:scale(0.5); }
}
</style>
</head>

<body class="p-6">

<div id="editor"></div>

<div class="mt-6 canvas-wrapper">
    <div id="canvas" class="canvas-inner">
        <div class="slide-content">
            <div id="preview" class="rendered-text"></div>
        </div>
    </div>
</div>

<button onclick="download()" class="mt-6 bg-black text-white px-6 py-3 rounded">
Download
</button>

<script>
const quill = new Quill('#editor', {
    theme: 'snow',
    modules: {
        toolbar: [
            ['bold','italic'],
            [{ 'color': [] }, { 'background': [] }],
            [{ 'align': [] }]
        ]
    }
});

/* 🔥 TRANSFORM HIGHLIGHT */
function transformHighlight(html){
    const temp = document.createElement('div');
    temp.innerHTML = html;

    temp.querySelectorAll('span').forEach(el => {
        const bg = el.style.backgroundColor;
        if(bg){
            const wrapper = document.createElement('span');
            wrapper.className = 'hl';
            wrapper.style.backgroundColor = bg;
            wrapper.innerHTML = el.innerHTML;

            el.replaceWith(wrapper);
        }
    });

    return temp.innerHTML;
}

/* SYNC */
quill.on('text-change', () => {
    const raw = quill.root.innerHTML;
    const fixed = transformHighlight(raw);
    document.getElementById('preview').innerHTML = fixed;
});

/* SCALE */
function updateScale(){
    const wrapper = document.querySelector('.canvas-wrapper');
    const inner = document.querySelector('.canvas-inner');
    const scale = wrapper.offsetWidth / 1080;
    inner.style.transform = `scale(${scale})`;
}
window.addEventListener('resize', updateScale);
updateScale();

/* DOWNLOAD */
async function download(){
    const original = document.getElementById('canvas');

    const clone = original.cloneNode(true);
    clone.style.transform = 'none';
    clone.style.position = 'absolute';
    clone.style.left = '-9999px';

    document.body.appendChild(clone);

    const canvas = await html2canvas(clone, {
        scale: 2,
        backgroundColor:'#fff',
        useCORS:true
    });

    const link = document.createElement('a');
    link.download = 'slide.png';
    link.href = canvas.toDataURL();
    link.click();

    document.body.removeChild(clone);
}
</script>

</body>
</html>
